services:
  # Backend API — Node/Express, free web service
  - type: web
    name: snaplink-api
    runtime: node
    plan: free
    region: oregon
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BASE_URL
        sync: false # set to the URL Render assigns this service, e.g. https://snaplink-api.onrender.com
      - key: CLIENT_URL
        sync: false # set to the URL Render assigns the static site, e.g. https://snaplink.onrender.com
      - key: MONGODB_URI
        sync: false # paste your MongoDB Atlas free-tier connection string
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 30d
      - key: SHORT_CODE_LENGTH
        value: 7
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 300

  # Frontend — Vite/React, free static site
  - type: web
    name: snaplink
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        sync: false # set to the URL of the snaplink-api service above
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
